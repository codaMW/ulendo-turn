app = "ulendo-turn"
primary_region = "jnb"  # Johannesburg — closest to Malawi

[build]
  dockerfile = "Dockerfile"

[[services]]
  protocol = "udp"
  internal_port = 3478

  [[services.ports]]
    port = 3478

[[services]]
  protocol = "tcp"
  internal_port = 3478

  [[services.ports]]
    port = 3478

[[services]]
  protocol = "tcp"
  internal_port = 5349

  [[services.ports]]
    port = 5349
