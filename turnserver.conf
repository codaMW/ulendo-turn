# Ulendo TURN Server — TCP relay only (Railway TCP proxy compatible)
listening-port=3478
listening-ip=0.0.0.0

# Force TCP only
no-udp
no-dtls
no-tls

# Auth
use-auth-secret
static-auth-secret=${TURN_SECRET}
realm=${TURN_REALM}

# Performance
no-multicast-peers
no-cli

# Logging
log-file=stdout
verbose

# Relay
min-port=49152
max-port=65535
no-udp-relay
