# Ulendo TURN Server — coturn config
listening-port=3478
tls-listening-port=5349

# Allow all IPs (Railway handles external IP)
listening-ip=0.0.0.0

# Auth
use-auth-secret
static-auth-secret=${TURN_SECRET}
realm=${TURN_REALM}

# Performance
no-multicast-peers
no-cli
no-tlsv1
no-tlsv1_1

# Logging
log-file=stdout
verbose

# Relay
min-port=49152
max-port=65535
